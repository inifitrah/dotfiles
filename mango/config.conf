# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 8
shadows_blur = 10
shadows_position_x = -2
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=13
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.88
scroller_focus_center=0
scroller_prefer_center=1
scroller_prefer_overspread=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=35

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1bordercolor
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
# Background color of the root window
rootcolor=0x222222ff
# Inactive window border
bordercolor=0x200C2Cff
# Drop shadow when dragging windows
dropcolor=0x8FBA7C55
# Split window border color in manual dwindle layout
splitcolor=0xEB441EFF
# Active window border
focuscolor=0x5f5f5fff
# Urgent window border (alerts)
urgentcolor=0xad401fff
maximizescreencolor=0x8f78b8ff
scratchpadcolor=0x6d5aa0ff
globalcolor=0x7a66b8ff
overlaycolor=0x5d4a78cc

sloppyfocus=0
# windowrule=isopensilent:1,appid:robloxstudiobeta.exe
#syncobj_enable=1
no_border_when_single=1
drag_tile_to_tile=1
xwayland_persistence=1
drag_warp_cursor=1


# cursor
cursor_size=26
cursor_theme=Afterglow-cursors

# monocle
tab_bar_height = 30
tab_bar_decorate_fg_color=0xe2e2e2ff
tab_bar_decorate_bg_color=0x131313ff
tab_bar_decorate_focus_fg_color=0x4b1763ff
tab_bar_decorate_focus_bg_color=0xC8BFBFBF
tab_bar_decorate_border_color=0x474747ff
tab_bar_decorate_border_width=0
tab_bar_decorate_corner_radius=10
tab_bar_decorate_padding_x=0
tab_bar_decorate_padding_y=0
tab_bar_decorate_font_desc=monospace Bold 10

# sub config load
source=./env.conf
source=./bind.conf
source=./rule.conf

# run autostart
exec-once=~/.config/mango/autostart.sh

source=~/.config/mango/noctalia.conf
