# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# noctalia V5
bind=SUPER+shift,Escape,spawn,noctalia msg panel-toggle session

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=SUPER,space,spawn,noctalia msg panel-toggle launcher
bind=SUPER,t,spawn,kitty
bind=SUPER,Return,toggle_named_scratchpad,none,terminal,kitty -T terminal sh -c "fastfetch --logo-type kitty; exec $SHELL"
# exit
bind=SUPER+SHIFT,m,quit
bind=ALT,q,killclient,

# zed
bind=SUPER+CTRL,Return,toggle_named_scratchpad,none,RandomNotes,zeditor -n ~/Documents/ObsidianVault/RandomNotes

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,X,focusstack,next
bind=alt,L,focusstack,next
bind=SUPER,Z,focusstack,previous
bind=alt,H,focusstack,previous
bind=SUPER,A,focusdir,left
bind=SUPER,D,focusdir,right
bind=SUPER,H,focusdir,left
bind=SUPER,L,focusdir,right
bind=SUPER+alt,h,viewtoleft_have_client
bind=SUPER+alt,l,viewtoright_have_client
# use bracket
bind=SUPER,code:35,viewtoright,
bind=SUPER,code:34,viewtoleft,
bind=SUPER,W,focusdir,up
bind=SUPER,S,focusdir,down
bind=SUPER,K,focusdir,up
bind=SUPER,J,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,L,exchange_client,right

# switch window status
bind=SUPER+ctrl,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
# bind=ALT,Tab,togglejump,
bind=SUPER,o,togglejump,
bind=ALT,v,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,c,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+ctrl,C,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,H,scroller_stack,left
bind=alt+super+ctrl,L,scroller_stack,right
bind=alt+super+ctrl,J,scroller_stack,up
bind=alt+super+ctrl,K,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER,n,switch_layout

# tag switch using bracket
bind=SUPER+shift,code:34,tagtoleft,0
bind=SUPER+shift,code:35,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=Alt+SHIFT,1,tagsilent,1
bind=Alt+SHIFT,2,tagsilent,2
bind=Alt+SHIFT,3,tagsilent,3
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

# monitor switch
#bind=....,focusmon,left
#bind=.....,focusmon,right
#bind=.....,tagmon,left
#bind=......,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+Ctrl+alt,btn_right,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
mousebind=SUPER+Ctrl+alt,btn_left,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=SUPER+Ctrl+alt,up,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=SUPER+Ctrl+alt,down,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=SUPER+ctrl,UP,viewtoleft
axisbind=SUPER+ctrl,DOWN,viewtoright
axisbind=SUPER+shift,UP,tagtoleft
axisbind=SUPER+shift,DOWN,tagtoright

# screenshot
bind=NONE,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh fullscreen
bind=SHIFT,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh region
bind=CTRL+SHIFT,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh window
bind=CTRL+SUPER,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh freeze
bind=SHIFT+SUPER,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh freeze-region
bind=CTRL,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh clipboard
bind=SUPER,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh annotate

# layout support:
# tile,scroller,monocle,grid,deck,center_tile,vertical_tile,right_tile,vertical_scroller,vertical_grid,vertical_deck,dwindle,fair,vertical_fair
# i like this layout cuz i use laptop XD : scroller, monocle, vertical_scroller
# Set specific layout
bind=SUPER,b,setlayout,monocle

# File manager
#bind=SUPER,e,spawn, kitty -T yazi -e yazi
bind=SUPER,e,toggle_named_scratchpad,none,yazi,kitty -T yazi -e yazi
bind=Alt,c,centerwin,
# bind=Alt,z,zoom,

# Group
bind=SUPER+ctrl,left,groupjoin,left
bind=SUPER+ctrl,down,groupjoin,down
bind=SUPER+ctrl,up,groupjoin,up
bind=SUPER+ctrl,right,groupjoin,right
bind=SUPER,apostrophe,groupfocus,next
bind=SUPER,right,groupfocus,next
bind=SUPER,U,groupleave
bind=SUPER,semicolon,groupfocus,prev
bind=SUPER,left,groupfocus,prev
