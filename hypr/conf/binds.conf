# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$fabricCLI = fabric-cli exec trah-shell

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = kitty yazi
#$menu = rofi -show drun
$scriptsDir = ~/.config/hypr/scripts
$menu = qs -c noctalia-shell ipc call launcher toggle

###################
### KEYBINDINGS ###
###################

# Center window
bind = $mainMod, G, centerwindow

# Power
bind = $mainMod SHIFT, Escape, exec, qs -c noctalia-shell ipc call sessionMenu toggle

# Reload trah-shell
bind = $mainMod ALT, B, exec, killall trah-shell; cd ~/.config/fabric; uwsm app -- python main.py

# microphone (SHIFT+up/down dipindah ke F keys karena akan dipakai movewindowto u/d di hyprscrolling)
bind = $mainMod, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle  # Toggle microphone mute
bind = $mainMod, F5, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+  # Naikkan volume mikrofon
bind = $mainMod, F6, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-  # Turunkan volume mikrofon

# volume (pindah ke F keys karena up/down dipakai fokus vertikal hyprscrolling)
bind = $mainMod, F1, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+  # Naikkan volume
bind = $mainMod, F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-  # Turunkan volume

# brightness (pindah ke F keys karena CTRL+up/down akan dipakai hyprscrolling)
bind = $mainMod, F3, exec, brightnessctl s 3%+  # Naikkan brightness
bind = $mainMod, F4, exec, brightnessctl s 3%-  # Turunkan brightness

bind = $mainMod CTRL, S, exec, $scriptsDir/ScreenShot.sh --now # Screenshot
bind = $mainMod CTRL, A, exec, $scriptsDir/ScreenShot.sh --area # Screenshot area
bind = $mainMod CTRL, D, exec, $scriptsDir/ScreenShot.sh --active # Screenshot active

bind = $mainMod, B, exec, $scriptsDir/LaunchAgs.sh # Launch AGS | Reload AGS
bind = $mainMod, H, exec, astal -i trah-shell -t Bar # Toggle bar

#  Window
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, $scriptsDir/KillActiveProcess.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pin # pin window
bind = $mainMod, T, exec, $terminal # open terminal
bind = $mainMod, O, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen # fullscreen app
bind = Ctrl+$mainMod+Shift, Up, movetoworkspacesilent, special:S # [hidden]

# Next/previous workspace with Z and X
bind = $mainMod, I, workspace, -1
bind = $mainMod, U, workspace, +1

# Move focus with mainMod + arrow keys
# Menggunakan layoutmsg focus agar kolom di-center saat fokus berpindah (niri-like)
# dan bisa wrap-around antar kolom tanpa pindah monitor
bind = $mainMod, A, layoutmsg, focus l   # Fokus kolom/window di kiri
bind = $mainMod, D, layoutmsg, focus r  # Fokus kolom/window di kanan
bind = $mainMod, H, layoutmsg, focus l   # Fokus kolom/window di kiri
bind = $mainMod, L, layoutmsg, focus r  # Fokus kolom/window di kanan
bind = $mainMod, K, movefocus, u           # Fokus window di atas (dalam kolom)
bind = $mainMod, J, movefocus, d         # Fokus window di bawah (dalam kolom)

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, I, movetoworkspace, -1 # Move workspace to the left
bind = $mainMod SHIFT, U, movetoworkspace, +1 # Move workspace to the right

# Zoom in & Zoom out
bind = $mainMod SHIFT, Z, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod SHIFT, X, exec,  hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')


bind = $mainMod, Tab, workspace, m+1 # Open next workspace
bind = $mainMod SHIFT, Tab, workspace, m-1 # Open previous workspace

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace,
bind = $mainMod SHIFT, S, movetoworkspace, special

# ============================================================
# HyprScrolling — Niri-like Scrolling Layout Keybindings
# ============================================================

# --- Scroll viewport (pindah kolom tanpa mengubah fokus) ---
# Seperti niri Mod+] dan Mod+[ untuk geser tampilan
bind = $mainMod, period, layoutmsg, move +col  # Geser viewport ke kolom kanan
bind = $mainMod, comma, layoutmsg, move -col   # Geser viewport ke kolom kiri

# --- Pindah window antar kolom (niri: Mod+Ctrl+Left/Right) ---
bind = $mainMod SHIFT, right, layoutmsg, movewindowto r  # Pindah window ke kolom kanan (promote ke kanan jika di ujung)
bind = $mainMod SHIFT, left, layoutmsg, movewindowto l   # Pindah window ke kolom kiri

# --- Pindah window atas/bawah dalam kolom (niri: Mod+Ctrl+Up/Down) ---
# Menggunakan ALT karena SHIFT+up/down sudah dipakai mic, CTRL+up/down untuk brightness
bind = $mainMod ALT, up, layoutmsg, movewindowto u    # Pindah window ke atas dalam kolom
bind = $mainMod ALT, down, layoutmsg, movewindowto d  # Pindah window ke bawah dalam kolom

# --- Promote: jadikan window sebagai kolom tersendiri (niri: Mod+Shift+Return) ---
bind = $mainMod, N, layoutmsg, promote  # Keluarkan window dari kolom → kolom baru

# --- Resize kolom: cycle preset lebar (niri: Mod+Minus dan Mod+Equal) ---
bind = $mainMod SHIFT, equal, layoutmsg, colresize +conf  # Perlebar kolom (cycle ke ukuran lebih besar)
bind = $mainMod SHIFT, minus, layoutmsg, colresize -conf  # Perkecil kolom (cycle ke ukuran lebih kecil)

# --- Fit operations: sesuaikan tampilan kolom ke layar ---
bind = $mainMod, W, layoutmsg, fit active        # Fit kolom aktif ke layar (center/fit)
bind = $mainMod SHIFT, W, layoutmsg, fit visible # Fit semua kolom yang terlihat
bind = $mainMod CTRL, W, layoutmsg, fit all      # Fit semua kolom di workspace

# --- Toggle metode fit: center ↔ fit ---
bind = $mainMod, I, layoutmsg, togglefit  # Ganti mode: center kolom / fit kolom ke layar

# --- Swap posisi kolom dengan tetangganya ---
bind = $mainMod ALT, left, layoutmsg, swapcol l   # Tukar kolom aktif dengan kolom di kiri
bind = $mainMod ALT, right, layoutmsg, swapcol r  # Tukar kolom aktif dengan kolom di kanan

# --- Pindah seluruh kolom ke workspace lain ---
bind = $mainMod CTRL, left, layoutmsg, movecoltoworkspace -1   # Pindah kolom ke workspace sebelumnya
bind = $mainMod CTRL, right, layoutmsg, movecoltoworkspace +1  # Pindah kolom ke workspace berikutnya

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 1%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
