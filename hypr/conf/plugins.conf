#############################
### Plugins Config ##########
#############################

plugin {
    hyprbars {
        # example config
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-clickss
        bar_padding = 7
        bar_height = 23
        bar_blur = true
        bar_part_of_window = false
        bar_precedence_over_border = true
        bar_text_align = center
        bar_buttons_alignment = left
        bar_button_padding = 8
        bar_title_enabled = false
        # bar_color = rgb(ffffff)
        # icon_on_hover = true

        hyprbars-button = rgb(FF605C), 13, ,
        #  hyprctl dispatch killactive
        hyprbars-button = rgb(FFBD44), 13, ,
        # hyprctl dispatch togglefloating 1
        hyprbars-button = rgb(00CA4E), 13, ,
        # hyprctl dispatch fullscreen 1
    }
#     hyprwinwrap {
#         # class is an EXACT match and NOT a regex!
#         class = kitty-bg
#     }
    # hyprtrails {
    #     color = rgb(1793d1)
    #     }

    hyprscrolling {
        # Jangan fullscreen otomatis saat hanya ada 1 kolom (niri tidak melakukan ini)
        fullscreen_on_one_column = false

        # Lebar default kolom 70% dari lebar monitor (mirip niri)
        column_width = 0.5

        # Preset lebar kolom saat cycling dengan +conf/-conf (1/3, 1/2, 2/3, full)
        explicit_column_widths = 0.333, 0.5, 0.667, 1.0

        # Metode fokus: 0 = center (kolom yang difokus ada di tengah layar, seperti niri)
        focus_fit_method = 1

        # Saat window difokus, layout otomatis scroll agar window tersebut terlihat
        follow_focus = true

        # Debounce focus event (ms) — 0 = langsung responsif
        follow_debounce_ms = 0
    }

}

